                    places: []
                    message: "Введите минимум 2 символа для поиска"

  # ═══════════════════════════════════════
  #  TEST
  # ═══════════════════════════════════════

  /api/test/start:
    get:
      tags: [Test]
      summary: Начать новый тест
      description: |
        Инициализирует состояние теста и возвращает первый вопрос.
        Тест работает по системе «ветвящихся путей» (paths): каждый ответ
        может разветвить или сузить набор активных путей.
        
        Состояние (`state`) нужно сохранить на клиенте и передавать обратно
        при каждом следующем ответе.
      responses:
        '200':
          description: Первый вопрос теста
          content:
            application/json:
              example:
                success: true
                state:
                  active_paths:
                    - id: 1
                      current_question_seq: 1
                      mood_ids: []
                      primary_slugs: []
                      secondary_conditions: []
                      negative_keywords: []
                      answers: []
                      parent_path_id: null
                  completed_paths: []
                  next_path_id: 2
                question:
                  path_id: 1
                  question:
                    id: 10
                    text: "Как ты себя чувствуешь сегодня?"
                    seq: 1
                  options:
                    - id: 101
                      text: "Энергично и активно"
                    - id: 102
                      text: "Спокойно и расслабленно"
                    - id: 103
                      text: "Романтично"

  /api/test/answer:
    post:
      tags: [Test]
      summary: Отправить ответ на вопрос теста
      description: |
        Обрабатывает ответ пользователя и возвращает либо следующий вопрос,
        либо финальные результаты (если тест завершён).
        
        **Важно:** нужно передавать полный объект `state` из предыдущего ответа.
        
        Поле `finished` в ответе указывает, завершён ли тест:
        - `false` → в ответе будет поле `question` со следующим вопросом
        - `true` → в ответе будет поле `places` с рекомендованными местами
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state, path_id, question_id, option_ids]
              properties:
                state:
                  type: object
                  description: Объект state, полученный из предыдущего ответа
                path_id:
                  type: integer
                  description: ID пути из поля question.path_id
                  example: 1
                question_id:
                  type: integer
                  description: ID вопроса из поля question.question.id
                  example: 10
                option_ids:
                  type: array
                  items:
                    type: integer
                  description: Массив выбранных вариантов (можно несколько)
                  example: [101]
      responses:
        '200':
          description: Следующий вопрос или финальные результаты
          content:
            application/json:
              examples:
                next_question:
                  summary: Тест продолжается — следующий вопрос
                  value:
                    success: true
                    finished: false
                    state:
                      active_paths:
                        - id: 1
                          current_question_seq: 2
                          mood_ids: [3]
                          primary_slugs: ["restaurant"]
                          secondary_conditions: []
                          negative_keywords: []
                          answers: [101]
                          parent_path_id: null
                      completed_paths: []
                      next_path_id: 2
                    question:
                      path_id: 1
                      question:
                        id: 11
                        text: "Предпочитаешь шумные места или тихие?"
                        seq: 2
                      options:
                        - id: 110
                          text: "Люблю оживлённую атмосферу"
                        - id: 111
                          text: "Предпочитаю спокойствие"
                finished:
                  summary: Тест завершён — результаты
                  value:
                    success: true
                    finished: true
                    places:
                      - id: 15
                        title: "Ресторан «Белая ночь»"
                        slug: "restoran-belaya-noch"
                        address: "наб. реки Мойки, 12"
                        description: "Романтический ресторан..."
                        photo_url: "https://example.com/rest.jpg"
                        timetable: "Ежедневно 12:00–00:00"
                        categories: ["restaurant"]
                        categories_list: ["restaurant"]
                        path_id: 1
                    state:
                      active_paths: []
                      completed_paths:
                        - id: 1
                          parent_path_id: null
                          criteria: {}
                          places: []
                          answers: [101, 111]
                      next_path_id: 2

