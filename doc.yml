  /api/admin/place/{place_id}/update:
    post:
      tags: [Admin — Places]
      summary: Сохранить изменения места
      description: |
        Принимает объект `updates` с полями для обновления. Обновляет только переданные поля.
        
        Поддерживаемые поля: `title`, `short_title`, `slug`, `address`, `timetable`, `phone`,
        `description`, `body_text`, `foreign_url`, `coords`, `subway`, `photos`,
        `main_photo_url`, `is_closed`, `categories`
        
        JSON-поля (`coords`, `subway`, `photos`, `categories`) принимаются как объекты/массивы
