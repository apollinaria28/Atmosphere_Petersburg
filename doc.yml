  # ═══════════════════════════════════════
  #  ADMIN — SUGGESTIONS
  # ═══════════════════════════════════════

  /api/admin/suggestions:
    get:
      tags: [Admin — Suggestions]
      summary: Список предложений для модерации
      description: |
        Возвращает предложения мест с дополнительными полями:
        - `user_category_names` — названия категорий, выбранных пользователем
        - `user_categories_count` — количество категорий
        - Поля `user_photos`, `moderated_photos`, `moderated_coords` десериализованы из JSON
        
        Включает статистику по статусам в поле `stats`.
      security:
        - sessionCookie: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, approved, rejected]
            default: pending
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Список предложений
          content:
            application/json:
              example:
                success: true
                suggestions:
                  - id: 34
                    user_id: 17
                    user_username: "Иван"
                    user_email: "user@example.com"
                    user_title: "Кафе «Уют»"
                    user_address: "ул. Рубинштейна, 15"
                    user_photos: ["/static/uploads/suggestions/abc123.jpg"]
                    moderated_title: null
                    moderated_slug: null
                    status: "pending"
                    created_at: "2024-11-10T14:30:00"
                    updated_at: "2024-11-10T14:30:00"
                    user_category_names: ["Кофейни"]
                    user_categories_count: 1
                    created_place_title: null
                    created_place_slug: null
                pagination:
                  page: 1
                  per_page: 10
                  total: 5
                  total_pages: 1
                  has_next: false
                  has_prev: false
                stats:
                  pending: 5
                  approved: 12
                  rejected: 3

  /api/admin/suggestions/{suggestion_id}:
    get:
      tags: [Admin — Suggestions]
      summary: Детали предложения для модератора
      description: |
        Возвращает полные данные предложения для страницы модерации.
        
        Включает:
        - `user_categories` — категории, выбранные пользователем (id, slug, name)
        - `moderated_categories` — категории, назначенные модератором
        - `user_photos_processed` и `moderated_photos_processed` — фото с полем `is_external`
        - `place_info` — если предложение одобрено, данные созданного места
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Детали предложения
          content:
            application/json:
              example:
                success: true
                suggestion:
                  id: 34
                  user_title: "Кафе «Уют»"
                  user_description: "Уютное кафе с домашней едой"
                  user_address: "ул. Рубинштейна, 15"
                  user_photos: ["/static/uploads/suggestions/abc123.jpg"]
                  user_photos_processed:
                    - url: "/static/uploads/suggestions/abc123.jpg"
                      is_external: false
                      type: "upload"
                  moderated_title: "Кафе Уют"
                  moderated_slug: "kafe-uyut"
                  moderated_address: "ул. Рубинштейна, 15"
                  moderated_description: null
                  moderated_photos: []
                  moderated_coords: {}
                  moderated_is_closed: false
                  status: "pending"
                  moderator_username: null
                  user_categories:
                    - id: 1
                      slug: "cafe"
                      name: "Кофейни"
                  moderated_categories: []
                  created_at: "2024-11-10T14:30:00"
                  updated_at: "2024-11-10T14:30:00"

    put:
      tags: [Admin — Suggestions]
      summary: Обновить данные предложения модератором
      description: |
        Позволяет модератору заполнить/исправить поля с префиксом `moderated_` перед одобрением.
        
        Доступные поля для обновления:
        `moderated_title`, `moderated_short_title`, `moderated_slug`, `moderated_address`,
        `moderated_timetable`, `moderated_phone`, `moderated_description`, `moderated_body_text`,
        `moderated_foreign_url`, `moderated_coords`, `moderated_photos`, `moderated_main_photo_url`,
        `moderated_is_closed`, `moderated_category_ids`
        
        Работает только для предложений со статусом `pending`.
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              moderated_title: "Кафе Уют"
              moderated_slug: "kafe-uyut"
              moderated_address: "ул. Рубинштейна, 15"
              moderated_category_ids: [1, 2]
      responses:
        '200':
          description: Результат
          content:
            application/json:
              example:
                success: true
                message: "Данные успешно обновлены"

  /api/admin/suggestions/{suggestion_id}/approve:
    post:
      tags: [Admin — Suggestions]
      summary: Одобрить предложение и создать место
      description: |
        Создаёт новое место в таблице `places` на основе данных предложения.
        
        **Приоритет данных:**
        - `moderated_*` поля → `user_*` поля (если модератор не заполнил — берётся пользовательский вариант)
        - Категории: сначала `moderated_categories`, затем `user_categories`
        - Фото: сначала `moderated_photos`, затем `user_photos`
        
        **Обязательные условия:** `moderated_title` и `moderated_slug` должны быть заполнены, slug — уникальный.
        
        После одобрения предложение получает статус `approved`, поле `created_place_id` заполняется ID нового места.
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_comment:
                  type: string
                  example: "Отличное место, добавлено!"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                success:
                  value:
                    success: true
                    message: "Предложение одобрено! Место добавлено в базу."
                    place_id: 351
                    place_slug: "kafe-uyut"
                missing_fields:
                  value:
                    success: false
                    error: "Заполните поле: slug"
                slug_exists:
                  value:
                    success: false
                    error: "Такой URL-адрес уже существует"

  /api/admin/suggestions/{suggestion_id}/reject:
    post:
      tags: [Admin — Suggestions]
      summary: Отклонить предложение
      description: Устанавливает статус `rejected`. Пользователь увидит комментарий модератора.
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_comment:
                  type: string
                  example: "Место уже есть в базе под другим названием"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              example:
                success: true
                message: "Предложение отклонено."

  /api/admin/suggestions/{suggestion_id}/check-duplicates:
    post:
      tags: [Admin — Suggestions]
      summary: Проверить возможные дубликаты перед одобрением
      description: |
        Ищет существующие места с похожим названием (ILIKE).
        Если `title` не передан — берёт название из самого предложения.
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "Кафе Уют"
                address:
                  type: string
                coords:
                  type: object
      responses:
        '200':
          description: Список возможных дубликатов
          content:
            application/json:
              example:
                success: true
                duplicates:
                  - id: 88
                    title: "Кафе Уют на Рубинштейна"
                    slug: "kafe-uyut-rubinsteyna"
                    address: "ул. Рубинштейна, 15"
                    main_photo_url: "https://example.com/photo.jpg"

  /api/admin/suggestions/upload-photo:
    post:
      tags: [Admin — Suggestions]
      summary: Загрузить фото модератором для предложения
      description: |
        Сохраняет файл в папку `static/uploads/suggestions/` и возвращает URL.
        Используется модератором для добавления/замены фотографий перед одобрением.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                success:
                  value:
                    success: true
                    url: "/static/uploads/suggestions/xyz789.jpg"
                    message: "Фото загружено"
                error:
                  value:
                    success: false
                    error: "Нет файла"

  /api/admin/categories:
    get:
      tags: [Admin — Suggestions]
      summary: Список категорий со статистикой (для модератора)
      description: Возвращает все категории с количеством мест и активных предложений в каждой.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Список категорий
          content:
            application/json:
              example:
                success: true
                categories:
                  - id: 1
                    slug: "cafe"
                    name: "Кофейни"
                    places_count: 45
                    suggestions_count: 3
                  - id: 2
                    slug: "museum"
                    name: "Музеи"
                    places_count: 18
                    suggestions_count: 0

