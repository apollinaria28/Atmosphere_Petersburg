  #  FAVORITES
  # ═══════════════════════════════════════

  /api/favorites/toggle:
    post:
      tags: [Favorites]
      summary: Добавить или удалить место из избранного
      description: |
        Переключает статус избранного для указанного места:
        если место уже в избранном — удаляет, иначе — добавляет.
        Возвращает актуальное общее количество избранных мест.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [place_id]
              properties:
                place_id:
                  type: integer
                  example: 42
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                added:
                  summary: Место добавлено в избранное
                  value:
                    success: true
                    action: "added"
                    favorites_count: 5
                    message: "Место добавлено в избранное"
                removed:
                  summary: Место убрано из избранного
                  value:
                    success: true
                    action: "removed"
                    favorites_count: 4
                    message: "Место удалено из избранного"

  /api/favorites/status:
    get:
      tags: [Favorites]
      summary: Проверить, какие места находятся в избранном
      description: |
        Принимает список ID мест и возвращает подмножество тех,
        которые добавлены в избранное текущим пользователем.
        Удобно для массовой проверки статуса на странице со списком мест.
      security:
        - sessionCookie: []
      parameters:
        - name: place_ids
          in: query
          required: true
          description: "ID мест через запятую: 1,5,23,42"
          schema:
            type: string
            example: "1,5,23,42"
      responses:
        '200':
          description: Список ID мест, которые в избранном
          content:
            application/json:
              example:
                success: true
                favorites: [5, 42]

  /api/favorites/list:
    get:
      tags: [Favorites]
      summary: Список избранных мест с пагинацией
      description: Возвращает полные карточки мест из избранного, отсортированные по дате добавления (новые сверху).
      security:
        - sessionCookie: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 12
      responses:
        '200':
          description: Избранные места
          content:
            application/json:
              example:
                success: true
                places:
                  - id: 42
                    title: "Кофейня «Север»"
                    slug: "kofeyna-sever"
                    address: "Невский пр., 44"
                    description: "Уютная кофейня..."
                    photo_url: "https://example.com/photo.jpg"
                    timetable: "Пн-Вс 08:00–22:00"
                    categories: ["cafe"]
                    categories_list: ["cafe"]
                pagination:
                  page: 1
                  per_page: 12
                  total: 5
                  total_pages: 1
                  has_next: false
                  has_prev: false

  /api/favorites/count:
    get:
      tags: [Favorites]
      summary: Количество избранных мест
      description: Быстрый эндпоинт для отображения счётчика в интерфейсе.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Количество
          content:
            application/json:
              example:
                success: true
                count: 5

