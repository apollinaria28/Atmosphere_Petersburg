      tags: [Reports (User)]
      summary: Статистика обращений пользователя
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Статистика
          content:
            application/json:
              example:
                success: true
                total: 3
                pending: 1
                resolved: 2

  /api/reports/{report_id}:
    get:
      tags: [Reports (User)]
      summary: Детали обращения (для владельца или администратора)
      description: Возвращает полную информацию об обращении, включая данные места и модератора, который его рассмотрел.
      security:
