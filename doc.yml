  /api/admin/reports/{report_id}/resolve:
    post:
      tags: [Admin — Reports]
      summary: Закрыть обращение (опционально обновить место)
      description: |
        Устанавливает статус обращения `resolved`.
        
        Если передан флаг `update_place: true` и объект `place_updates` — одновременно обновляет данные места.
        
        Поддерживаемые поля в `place_updates`:
        `title`, `short_title`, `address`, `timetable`, `phone`, `description`,
        `body_text`, `foreign_url`, `coords`, `subway`, `photos`, `main_photo_url`,
        `is_closed`, `categories`
      security:
        - sessionCookie: []
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution_comment:
                  type: string
                  example: "Адрес исправлен"
                update_place:
                  type: boolean
                  default: false
                place_updates:
                  type: object
            example:
              resolution_comment: "Адрес исправлен в базе"
              update_place: true
              place_updates:
                address: "Невский пр., 50"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                resolved_only:
                  value:
                    success: true
                    message: "Сообщение отмечено как решенное"
                resolved_with_update:
                  value:
                    success: true
                    message: "Сообщение отмечено как решенное и место обновлено"

  /api/admin/reports/{report_id}/update-place:
    post:
      tags: [Admin — Reports]
      summary: Обновить место без закрытия обращения
      description: |
        Позволяет модератору исправить данные места, не меняя статус обращения.
        Удобно когда нужно проверить несколько правок до окончательного закрытия.
      security:
        - sessionCookie: []
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                updates:
                  type: object
            example:
              updates:
                phone: "+7 (812) 999-99-99"
                timetable: "Пн-Вс 09:00–23:00"
      responses:
        '200':
          description: Место обновлено
          content:
            application/json:
              example:
                success: true
                message: "Место успешно обновлено"
                place:
                  id: 42
                  title: "Кофейня «Север»"
                  slug: "kofeyna-sever"

