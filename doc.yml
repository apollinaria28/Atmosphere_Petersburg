  # ═══════════════════════════════════════
  #  PROFILE
  # ═══════════════════════════════════════

  /api/profile/data:
    get:
      tags: [Profile]
      summary: Данные профиля (дата регистрации и последнего обновления)
      description: |
        Возвращает даты из таблицы users для текущего авторизованного пользователя.
        Основная информация (имя, email, аватар) берётся из объекта сессии Flask-Login
        и доступна на фронтенде без отдельного запроса.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Данные профиля
          content:
            application/json:
              example:
                success: true
                registration_date: "2024-03-15T10:22:00.000000"
                last_updated: "2024-11-01T18:45:00.000000"

  /api/profile/update:
    post:
      tags: [Profile]
      summary: Обновление профиля (имя и аватар)
      description: |
        Обновляет имя пользователя и/или URL аватара.
        После успешного обновления пересоздаёт сессию Flask-Login с новыми данными.
        
        **Валидация:** username должен быть уникальным среди всех пользователей.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  example: "Александр"
                avatar_url:
                  type: string
                  nullable: true
                  example: "/static/avatars/avatar3.png"
      responses:
        '200':
          description: Профиль обновлён
          content:
            application/json:
              examples:
                success:
                  summary: Успех
                  value:
                    success: true
                    message: "Профиль успешно обновлен"
                    user:
                      id: "17"
                      username: "Александр"
                      email: "user@example.com"
                      avatar_url: "/static/avatars/avatar3.png"
                      role: "user"
                username_taken:
                  summary: Имя уже занято
                  value:
                    success: false
                    error: "Это имя пользователя уже занято"

  /api/profile/suggestions/stats:
    get:
      tags: [Profile]
      summary: Статистика предложений пользователя по статусам
      description: Показывает сводку предложений мест, отправленных текущим пользователем.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Статистика
          content:
            application/json:
              example:
                success: true
                pending: 2
                approved: 5
                rejected: 1
                total: 8

  /api/avatars:
    get:
      tags: [Profile]
      summary: Список доступных аватаров
      description: |
        Читает файлы из папки `static/avatars/` и возвращает их список.
        Если папка пуста или недоступна — возвращает дефолтный набор из 6 аватаров.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Список аватаров
          content:
            application/json:
              example:
                success: true
                avatars:
                  - id: "avatar1"
                    url: "/static/avatars/avatar1.png"
                    name: "Avatar1"
                  - id: "avatar2"
                    url: "/static/avatars/avatar2.png"
                    name: "Avatar2"

  # ═══════════════════════════════════════
  #  SUGGESTIONS (USER)
  # ═══════════════════════════════════════

  /api/categories:
    get:
      tags: [Suggestions (User)]
      summary: Список всех категорий для формы предложения места
      description: Возвращает все категории из таблицы `categories_api`, отсортированные по имени.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Список категорий
          content:
            application/json:
              example:
                success: true
                categories:
                  - id: 1
                    slug: "cafe"
                    name: "Кофейни"
                  - id: 2
                    slug: "museum"
                    name: "Музеи"
                  - id: 3
                    slug: "bar"
                    name: "Бары"

  /api/suggest-place:
    post:
      tags: [Suggestions (User)]
      summary: Отправить предложение нового места на модерацию
      description: |
        Создаёт новое предложение со статусом `pending`.
        
        Принимает данные двумя способами:
        - `multipart/form-data` — с загрузкой файлов фотографий
        - `application/json` — только текстовые данные и URL фотографий
        
        **Обязательные поля:** `user_title`, `user_description`, `user_address` + минимум одна категория.
        
        Загруженные файлы сохраняются в `static/uploads/suggestions/`.
        Можно передавать и URL, и файлы одновременно — они объединяются в один список.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [user_title, user_description, user_address, category_ids]
              properties:
                user_title:
                  type: string
                  example: "Кафе «Уют»"
                user_description:
                  type: string
                  example: "Уютное кафе с домашней едой на тихой улочке"
                user_address:
                  type: string
                  example: "ул. Рубинштейна, 15"
                user_timetable:
                  type: string
                  example: "Пн-Пт 09:00–21:00"
                user_phone:
                  type: string
                  example: "+7 (812) 123-45-67"
                user_foreign_url:
                  type: string
                  example: "https://cafe-uyut.ru"
                user_photos_url:
                  type: string
                  description: URL фотографий через запятую
                category_ids:
                  type: string
                  description: ID категорий через запятую
                  example: "1,3"
                user_photos:
                  type: array
                  items:
                    type: string
                    format: binary
          application/json:
            schema:
              type: object
              required: [user_title, user_description, user_address, category_ids]
              properties:
                user_title:
                  type: string
                user_description:
                  type: string
                user_address:
                  type: string
                user_timetable:
                  type: string
                user_phone:
                  type: string
                user_foreign_url:
                  type: string
                category_ids:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Предложение отправлено
          content:
            application/json:
              examples:
                success:
                  summary: Успех
                  value:
                    success: true
                    message: "Спасибо! Ваше предложение отправлено на модерацию."
                    suggestion_id: 34
                    uploaded_photos: 2
                no_category:
                  summary: Нет категорий
                  value:
                    success: false
                    error: "Выберите хотя бы одну категорию"

  /api/user/suggestions:
    get:
      tags: [Suggestions (User)]
      summary: Список предложений текущего пользователя
      description: Возвращает предложения мест, отправленных текущим пользователем, с фильтром по статусу и пагинацией.
      security:
        - sessionCookie: []
      parameters:
        - name: status
          in: query
          description: "Фильтр: all | pending | approved | rejected"
          schema:
            type: string
            enum: [all, pending, approved, rejected]
            default: all
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
        - name: limit
          in: query
          description: Альтернатива per_page для блока «последние N»
          schema:
            type: integer
      responses:
        '200':
          description: Список предложений
          content:
            application/json:
              example:
                success: true
                suggestions:
                  - id: 34
                    user_title: "Кафе «Уют»"
                    status: "pending"
                    created_at: "2024-11-10T14:30:00"
                    admin_comment: null
                    created_place_id: null
                    place_title: null
                    place_slug: null
                  - id: 21
                    user_title: "Книжный «Подписные издания»"
                    status: "approved"
                    created_at: "2024-09-01T09:00:00"
                    admin_comment: "Место добавлено, спасибо!"
                    created_place_id: 88
                    place_title: "Подписные издания"
                    place_slug: "podpisnye-izdaniya"
                pagination:
                  page: 1
                  per_page: 10
                  total: 2
                  total_pages: 1
                  has_next: false
                  has_prev: false

  /api/suggestions/{suggestion_id}:
    get:
      tags: [Suggestions (User)]
      summary: Детали предложения (для владельца или администратора)
      description: |
        Возвращает полную информацию о предложении, включая:
        - данные пользователя (user_*)
        - список категорий, выбранных пользователем
        - данные созданного места (если предложение одобрено)
        
        Доступ: только владелец или администратор.
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Детали предложения
          content:
            application/json:
              example:
                success: true
                suggestion:
                  id: 34
                  user_id: 17
                  user_username: "Иван"
                  user_email: "user@example.com"
                  user_title: "Кафе «Уют»"
                  user_description: "Уютное кафе с домашней едой"
                  user_address: "ул. Рубинштейна, 15"
                  user_timetable: "Пн-Пт 09:00–21:00"
                  user_phone: "+7 (812) 123-45-67"
                  user_foreign_url: "https://cafe-uyut.ru"
                  user_photos: ["/static/uploads/suggestions/abc123.jpg"]
                  user_main_photo_url: "/static/uploads/suggestions/abc123.jpg"
                  status: "pending"
                  admin_comment: null
                  created_place_id: null
                  place_id: null
                  place_title: null
                  place_slug: null
                  user_category_names: ["Кофейни", "Кафе"]
                  created_at: "2024-11-10T14:30:00"
                  updated_at: "2024-11-10T14:30:00"
        '403':
          description: Доступ запрещён
          content:
            application/json:
              example:
                success: false
                error: "Доступ запрещён"
        '404':
          description: Не найдено
          content:
            application/json:
              example:
                success: false
                error: "Предложение не найдено"

    put:
      tags: [Suggestions (User)]
      summary: Редактировать предложение (только статус pending, только владелец)
      description: |
        Позволяет владельцу редактировать данные предложения пока оно ещё на модерации.
        Если предложение уже одобрено или отклонено — редактирование недоступно.
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_title:
                  type: string
                user_description:
                  type: string
                user_address:
                  type: string
                user_timetable:
                  type: string
                user_phone:
                  type: string
                user_foreign_url:
                  type: string
                user_photos:
                  type: array
                  items:
                    type: string
                  description: Полный новый список URL фотографий (заменяет старый)
                category_ids:
                  type: array
                  items:
                    type: integer
                  description: Новый список ID категорий (заменяет старый)
            example:
              user_title: "Кафе «Уют» (уточнено)"
              user_address: "ул. Рубинштейна, 15, вход со двора"
              category_ids: [1, 2]
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              examples:
                success:
                  value:
                    success: true
                    message: "Предложение успешно обновлено"
                not_pending:
                  value:
                    success: false
                    error: "Редактирование доступно только для заявок на модерации"

  /api/suggestions/{suggestion_id}/photo:
    post:
      tags: [Suggestions (User)]
      summary: Добавить фото к предложению (файл или URL)
      description: |
        Добавляет одну фотографию к предложению (только если статус `pending`).
        
        Два способа:
        - Загрузить файл через `multipart/form-data` (поле `photo`) — файл сохраняется на сервере
        - Передать URL через JSON (поле `photo_url`) — сохраняется только ссылка
        
        Если это первое фото и `user_main_photo_url` ещё не задан — оно становится главным.
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
          application/json:
            schema:
              type: object
              properties:
                photo_url:
                  type: string
                  example: "https://example.com/photo.jpg"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                success:
                  value:
                    success: true
                    message: "Фото добавлено"
                    photo_url: "/static/uploads/suggestions/def456.jpg"
                duplicate:
                  value:
                    success: false
                    error: "Это фото уже есть в списке"

    delete:
      tags: [Suggestions (User)]
      summary: Удалить фото из предложения
      description: |
        Удаляет фото из списка `user_photos`.
        Если удалённое фото было главным — новым главным становится первое оставшееся.
        Локальные файлы (`/static/uploads/...`) удаляются физически с диска.
      security:
        - sessionCookie: []
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [photo_url]
              properties:
                photo_url:
                  type: string
                  example: "/static/uploads/suggestions/abc123.jpg"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                success:
                  value:
                    success: true
                    message: "Фото удалено"
                not_found:
                  value:
                    success: false
                    error: "Фото не найдено в списке"

  # ═══════════════════════════════════════
  #  REPORTS (USER)
  # ═══════════════════════════════════════

  /api/report-error:
    post:
      tags: [Reports (User)]
      summary: Сообщить об ошибке в существующем месте
      description: |
        Создаёт обращение со статусом `pending` — на рассмотрение администратора.
        
        Поле `subject` — тема (тип ошибки): например «Неверный адрес», «Закрыто».
        Поле `message` — подробное описание проблемы.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [place_id, subject, message]
              properties:
                place_id:
                  type: integer
                  example: 42
                subject:
                  type: string
                  maxLength: 200
                  example: "Неверный адрес"
                message:
                  type: string
                  maxLength: 2000
                  example: "Кафе переехало по адресу Невский пр., 50"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                success:
                  value:
                    success: true
                    message: "Спасибо! Ваше сообщение об ошибке отправлено на рассмотрение."
                    report_id: 12
                place_not_found:
                  value:
                    success: false
                    error: "Место не найдено или закрыто"

  /api/user/reports:
    get:
      tags: [Reports (User)]
      summary: Список сообщений об ошибках текущего пользователя
      description: Возвращает все обращения пользователя с информацией о месте и статусе рассмотрения.
      security:
        - sessionCookie: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, resolved]
            default: all
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Список обращений
          content:
            application/json:
              example:
                success: true
                reports:
                  - id: 12
                    place_id: 42
                    place_title: "Кофейня «Север»"
                    place_slug: "kofeyna-sever"
                    place_photo: "https://example.com/photo.jpg"
                    user_id: 17
                    subject: "Неверный адрес"
                    message: "Кафе переехало по адресу Невский пр., 50"
                    status: "pending"
                    resolved_by: null
                    resolved_by_username: null
                    resolution_comment: null
                    created_at: "2024-11-12T09:00:00"
                    updated_at: "2024-11-12T09:00:00"
                pagination:
                  page: 1
                  per_page: 10
                  total: 1
                  total_pages: 1
                  has_next: false
                  has_prev: false
                stats:
                  pending: 1
                  resolved: 0

  /api/user/reports/stats:
