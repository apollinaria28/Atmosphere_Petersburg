# ═══════════════════════════════════════
  #  ROUTES
  # ═══════════════════════════════════════

  /api/routes:
    get:
      tags: [Routes]
      summary: Список маршрутов пользователя
      description: |
        Возвращает все маршруты текущего авторизованного пользователя.
        Каждый маршрут включает полный список мест с координатами и фотографиями.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Список маршрутов
          content:
            application/json:
              example:
                - id: 1
                  name: "Прогулка по центру"
                  description: "Маршрут выходного дня"
                  created_at: "2024-03-15T10:30:00"
                  places_count: 2
                  places:
                    - id: 42
                      title: "Парк Горького"
                      address: "ул. Крымский Вал, 9"
                      order_index: 0
                      coords: { lat: 55.7298, lon: 37.6008 }
                      main_photo_url: "/static/uploads/places/park.jpg"
                      photos: []
                    - id: 87
                      title: "Музей современного искусства"
                      address: "Петровка, 25"
                      order_index: 1
                      coords: { lat: 55.7647, lon: 37.6148 }
                      main_photo_url: "/static/uploads/places/museum.jpg"
                      photos: []
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

    post:
      tags: [Routes]
      summary: Создание нового маршрута
      description: |
        Создаёт новый пустой маршрут для текущего пользователя.
        После создания места добавляются отдельным запросом `POST /api/routes/{id}/places`.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Название маршрута
                  example: "Прогулка по центру"
                description:
                  type: string
                  description: Описание маршрута (необязательно)
                  example: "Маршрут выходного дня"
      responses:
        '201':
          description: Маршрут создан
          content:
            application/json:
              example:
                id: 1
                name: "Прогулка по центру"
                description: "Маршрут выходного дня"
                created_at: "2024-03-15T10:30:00"
        '400':
          description: Не передано название
          content:
            application/json:
              example:
                error: "Name is required"
        '500':
          description: Ошибка создания
          content:
            application/json:
              example:
                error: "Could not create route"
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

  /api/routes/{id}:
    get:
      tags: [Routes]
      summary: Детальная информация о маршруте
      description: |
        Возвращает маршрут с полным списком мест в порядке `order_index`.
        Доступен только владельцу маршрута.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID маршрута
          example: 1
      responses:
        '200':
          description: Данные маршрута
          content:
            application/json:
              example:
                id: 1
                name: "Прогулка по центру"
                description: "Маршрут выходного дня"
                created_at: "2024-03-15T10:30:00"
                places:
                  - id: 42
                    title: "Парк Горького"
                    address: "ул. Крымский Вал, 9"
                    order_index: 0
                    coords: { lat: 55.7298, lon: 37.6008 }
                    main_photo_url: "/static/uploads/places/park.jpg"
                    photos: []
                  - id: 87
                    title: "Музей современного искусства"
                    address: "Петровка, 25"
                    order_index: 1
                    coords: { lat: 55.7647, lon: 37.6148 }
                    main_photo_url: "/static/uploads/places/museum.jpg"
                    photos: []
        '403':
          description: Маршрут принадлежит другому пользователю
          content:
            application/json:
              example:
                error: "Forbidden"
        '404':
          description: Маршрут не найден
          content:
            application/json:
              example:
                error: "Route not found"
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

    put:
      tags: [Routes]
      summary: Обновление названия и/или описания маршрута
      description: |
        Изменяет название и/или описание существующего маршрута.
        Доступно только владельцу. Оба поля необязательны — можно передать только одно.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID маршрута
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Новое название"
                description:
                  type: string
                  example: "Обновлённое описание"
      responses:
        '200':
          description: Маршрут обновлён
          content:
            application/json:
              example:
                message: "Route updated"
        '403':
          description: Маршрут принадлежит другому пользователю
          content:
            application/json:
              example:
                error: "Forbidden"
        '404':
          description: Маршрут не найден
          content:
            application/json:
              example:
                error: "Route not found"
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

    delete:
      tags: [Routes]
      summary: Удаление маршрута
      description: |
        Удаляет маршрут и все связанные с ним точки.
        Доступно только владельцу.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID маршрута
          example: 1
      responses:
        '200':
          description: Маршрут удалён
          content:
            application/json:
              example:
                message: "Route deleted"
        '403':
          description: Маршрут принадлежит другому пользователю
          content:
            application/json:
              example:
                error: "Forbidden"
        '404':
          description: Маршрут не найден
          content:
            application/json:
              example:
                error: "Route not found"
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

  /api/routes/{id}/places:
    post:
      tags: [Routes]
      summary: Добавление мест в маршрут
      description: |
        Добавляет одно или несколько мест в маршрут.
        
        Можно передать как одиночный `int`, так и массив ID.
        Места добавляются в конец маршрута в порядке передачи.
        Если место уже есть в маршруте — добавится повторно (дублирование на усмотрение модели).
        
        Доступно только владельцу маршрута.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID маршрута
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [place_ids]
              properties:
                place_ids:
                  oneOf:
                    - type: integer
                      description: Одно место
                      example: 42
                    - type: array
                      items:
                        type: integer
                      description: Несколько мест
                      example: [42, 87, 103]
      responses:
        '200':
          description: Места добавлены
          content:
            application/json:
              examples:
                single:
                  summary: Одно место
                  value:
                    message: "Added 1 places"
                    added: [42]
                multiple:
                  summary: Несколько мест
                  value:
                    message: "Added 3 places"
                    added: [42, 87, 103]
        '400':
          description: Не переданы place_ids
          content:
            application/json:
              example:
                error: "place_ids required"
        '403':
          description: Маршрут принадлежит другому пользователю
          content:
            application/json:
              example:
                error: "Forbidden"
        '404':
          description: Маршрут не найден
          content:
            application/json:
              example:
                error: "Route not found"
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

  /api/routes/{id}/places/{place_id}:
    delete:
      tags: [Routes]
      summary: Удаление места из маршрута
      description: |
        Удаляет конкретное место из маршрута по его ID.
        Доступно только владельцу маршрута.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID маршрута
          example: 1
        - name: place_id
          in: path
          required: true
          schema:
            type: integer
          description: ID места
          example: 42
      responses:
        '200':
          description: Место удалено
          content:
            application/json:
              example:
                message: "Place removed"
        '403':
          description: Маршрут принадлежит другому пользователю
          content:
            application/json:
              example:
                error: "Forbidden"
        '404':
          description: Маршрут или место не найдено
          content:
            application/json:
              examples:
                route_not_found:
                  summary: Маршрут не найден
                  value:
                    error: "Route not found"
                place_not_found:
                  summary: Место не в маршруте
                  value:
                    error: "Place not found in route"
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

  /api/routes/{id}/places/order:
    put:
      tags: [Routes]
      summary: Изменение порядка мест в маршруте
      description: |
        Принимает упорядоченный список ID мест и переставляет их в маршруте согласно переданному порядку.
        Обновляются только места, уже существующие в маршруте — лишние ID игнорируются.
        Доступно только владельцу маршрута.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID маршрута
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items:
                    type: integer
                  description: |
                    Список ID мест в желаемом порядке.
                    Индекс в массиве = новый order_index места.
                  example: [87, 42, 103]
      responses:
        '200':
          description: Порядок обновлён
          content:
            application/json:
              example:
                message: "Order updated"
        '400':
          description: Не передан список или передан не массив
          content:
            application/json:
              example:
                error: "order list required"
        '403':
          description: Маршрут принадлежит другому пользователю
          content:
            application/json:
              example:
                error: "Forbidden"
        '404':
          description: Маршрут не найден
          content:
            application/json:
              example:
                error: "Route not found"
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

  # ═══════════════════════════════════════
  #  PLACES — Nearby
  # ═══════════════════════════════════════

  /api/places/{place_id}/nearby:
    get:
      tags: [Places]
      summary: Ближайшие места
      description: |
        Возвращает список мест в заданном радиусе от указанного места.
        Расстояние считается по координатам из поля `coords` (JSONB: `{lat, lon}`).
        
        Используется в двух сценариях:
        - **Кнопка "Ближайшие места"** на странице детального места — открывает карту с маркерами вокруг текущего места.
        - **Автооткрытие** при возврате по хлебным крошкам (`?open_nearby=1`).
        
        Место с `place_id` из запроса в результаты **не включается**.
        Места без координат пропускаются.
        Требует авторизации.
      security:
        - sessionCookie: []
      parameters:
        - name: place_id
          in: path
          required: true
          schema:
            type: integer
          description: ID места, относительно которого ищутся ближайшие
          example: 42
        - name: radius
          in: query
          required: false
          schema:
            type: integer
            default: 1000
          description: Радиус поиска в метрах
          example: 2000
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Максимальное количество мест в ответе
          example: 10
      responses:
        '200':
          description: Список ближайших мест, отсортированных по расстоянию
          content:
            application/json:
              example:
                - id: 87
                  title: "Музей современного искусства"
                  address: "Петровка, 25"
                  description: "Постоянная экспозиция современного искусства…"
                  distance: 340
                  coords: { lat: 55.7647, lon: 37.6148 }
                  main_photo_url: "/static/uploads/places/museum.jpg"
                  photos: []
                - id: 103
                  title: "Кофейня Dacha"
                  address: "Пятницкая, 11"
                  description: "Уютная кофейня с авторскими напитками…"
                  distance: 780
                  coords: { lat: 55.7401, lon: 37.6234 }
                  main_photo_url: "/static/uploads/places/dacha.jpg"
                  photos: []
        '400':
          description: У места не указаны координаты
          content:
            application/json:
              example:
                error: "Place has no coordinates"
        '404':
          description: Место не найдено
          content:
            application/json:
              example:
                error: "Place not found"
        '401':
          description: Не авторизован
          content:
            application/json:
              example:
                error: "Unauthorized"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Flask session cookie, устанавливается при /api/login или /api/register