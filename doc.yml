openapi: 3.0.3
info:
  title: Атмосфера Петербурга
  description: |
    API приложения, показывающее места города Санкт-Петербург.
    
    **Аутентификация:** все защищённые эндпоинты требуют активной сессии Flask (cookie `session`).
    Сессия устанавливается при успешном вызове `POST /api/login` или `POST /api/register`.
    
    **Роли:**
    - `user` — обычный пользователь
    - `admin` — администратор/модератор (доступ к `/api/admin/*`)
    
    **Общий формат ошибок:**
    ```json
    { "success": false, "error": "Текст ошибки" }
    ```
  version: 1.0.0

servers:
  # Added by API Auto Mocking Plugin
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/APOLLINARIAAGEEVA/Atmosphere_Petersburg/1.0.0
  - url: http://localhost:5000
    description: Локальный сервер разработки

tags:
  - name: Auth
    description: Регистрация, вход и управление сессией
  - name: Places
    description: Получение, поиск и фильтрация мест
  - name: Test
    description: Интерактивный тест для подбора мест по настроению
  - name: Favorites
    description: Избранные места пользователя
  - name: Visited
    description: Посещённые места пользователя
  - name: Profile
    description: Профиль пользователя
  - name: Suggestions (User)
    description: Предложение новых мест пользователем
  - name: Reports (User)
    description: Сообщения об ошибках в существующих местах
  - name: Admin — Suggestions
    description: Модерация предложений (только admin)
  - name: Admin — Reports
    description: Модерация сообщений об ошибках (только admin)
  - name: Admin — Places
    description: Управление базой мест (только admin)
  - name: Admin — Dashboard
    description: Статистика и активности панели администратора
  - name: Routes
    description: Маршруты пользователя
# ──────────────────────────────────────────────────────────────
paths:

  # ═══════════════════════════════════════
  #  AUTH
  # ═══════════════════════════════════════

  /api/register:
    post:
      tags: [Auth]
      summary: Шаг 1 — Начало регистрации (отправка кода на email)
      description: |
        Регистрация теперь двухшаговая:
        
        **Шаг 1** — `POST /api/register` — валидирует данные и отправляет 4-значный код на указанный пользователем email.
        Пользователь **не создаётся** сразу — данные временно сохраняются в таблице `email_verifications` на 10 минут.
        
        **Шаг 2** — `POST /api/verify-email` — подтверждает код и создаёт аккаунт.
        
        Если регистрация уже начата для этого email — данные и код перезаписываются.
        
        **Валидация:**
        - `email` — валидный формат, не занят в таблице `users`
        - `username` — только буквы (RU/EN), пробелы и дефисы, не более 30 символов, уникальный
        - `password` — минимум 6 символов, хотя бы одна заглавная и одна строчная буква
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, username]
              properties:
                email:
                  type: string
                  example: "user@example.com"
                password:
                  type: string
                  example: "MyPass123"
                username:
                  type: string
                  example: "Иван"
      responses:
        '200':
          description: Код отправлен — нужно перейти к шагу 2
          content:
            application/json:
              examples:
                success:
                  summary: Код отправлен
                  value:
                    success: true
                    message: "Код подтверждения отправлен на user@example.com"
                email_exists:
                  summary: Email уже зарегистрирован
                  value:
                    success: false
                    error: "Пользователь с таким email уже существует"
                username_exists:
                  summary: Username уже занят
                  value:
                    success: false
                    error: "Это имя пользователя уже занято"
                weak_password:
                  summary: Слабый пароль
                  value:
                    success: false
                    error: "Пароль должен содержать минимум 6 символов, включая хотя бы одну заглавную и одну строчную букву (латиницу или кириллицу)"
                send_failed:
                  summary: Не удалось отправить письмо
                  value:
                    success: false
                    error: "Не удалось отправить код на email: <причина>"

  /api/verify-email:
    post:
      tags: [Auth]
      summary: Шаг 2 — Подтверждение email и создание аккаунта
      description: |
        Принимает email и 4-значный код из письма.
        Если код верный и не истёк (действует 10 минут) — создаёт пользователя,
        удаляет временную запись и сразу авторизует (устанавливает сессию).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  example: "user@example.com"
                code:
                  type: string
                  description: 4-значный код из письма
                  example: "4827"
      responses:
        '200':
          description: Результат подтверждения
          content:
            application/json:
              examples:
                success:
                  summary: Аккаунт создан, сессия установлена
                  value:
                    success: true
                    message: "Регистрация успешна! Добро пожаловать!"
                wrong_code:
                  summary: Неверный или истёкший код
                  value:
                    success: false
                    error: "Неверный или просроченный код подтверждения"
                email_taken:
                  summary: Email занят (гонка запросов)
                  value:
                    success: false
                    error: "Пользователь с таким email уже существует"

  /api/resend-code:
    post:
      tags: [Auth]
      summary: Повторная отправка кода подтверждения при регистрации
      description: |
        Генерирует новый 4-значный код и отправляет его на email.
        Работает только если для этого email уже начата регистрация (есть запись в `email_verifications`).
        Обновляет код и срок действия (ещё 10 минут).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: "user@example.com"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                success:
                  summary: Новый код отправлен
                  value:
                    success: true
                    message: "Новый код отправлен на user@example.com"
                no_registration:
                  summary: Регистрация не начата
                  value:
                    success: false
                    error: "Для этого email не начата регистрация"
                send_failed:
                  summary: Ошибка отправки
                  value:
                    success: false
                    error: "Не удалось отправить код: <причина>"

  /api/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      description: |
        Проверяет email и пароль, устанавливает сессию.
        Для администраторов в ответе возвращается поле `redirect: "/admin"`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "user@example.com"
                password:
                  type: string
                  example: "MyPass123"
                remember:
                  type: boolean
                  default: false
                  description: Запомнить сессию на длительное время
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              examples:
                user_login:
                  summary: Обычный пользователь
                  value:
                    success: true
                    message: "Вход выполнен успешно"
                admin_login:
                  summary: Администратор
                  value:
                    success: true
                    message: "Вход выполнен успешно"
                    redirect: "/admin"
                wrong_password:
                  summary: Неверный пароль
                  value:
                    success: false
                    error: "Неверный пароль"
                not_found:
                  summary: Пользователь не найден
                  value:
                    success: false
                    error: "Пользователь не найден или аккаунт деактивирован"

  /api/forgot-password:
    post:
      tags: [Auth]
      summary: Шаг 1 сброса пароля — отправка кода на email
      description: |
        Сброс пароля двухшаговый:
        
        **Шаг 1** — `POST /api/forgot-password` — отправляет 4-значный код на email.
        
        **Шаг 1.5** *(опционально)* — `POST /api/verify-reset-code` — проверяет код без смены пароля
        (используется для валидации кода на отдельном экране перед вводом нового пароля).
        
        **Шаг 2** — `POST /api/reset-password` — подтверждает код и устанавливает новый пароль.
        
        **Безопасность:** если email не зарегистрирован — ответ всё равно `success: true`,
        чтобы не раскрывать, какие email есть в системе.
        
        Код действителен 10 минут и хранится в таблице `password_resets`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: "user@example.com"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                success:
                  summary: Код отправлен (или email не найден — ответ одинаковый)
                  value:
                    success: true
                    message: "Код для сброса пароля отправлен на email"
                not_registered:
                  summary: Email не зарегистрирован (намеренно выглядит как успех)
                  value:
                    success: true
                    message: "Если email зарегистрирован, код отправлен"
                send_failed:
                  summary: Ошибка отправки письма
                  value:
                    success: false
                    error: "Не удалось отправить код: <причина>"

  /api/verify-reset-code:
    post:
      tags: [Auth]
      summary: Шаг 1.5 — Проверка кода сброса (без смены пароля)
      description: |
        Проверяет корректность кода сброса пароля не меняя сам пароль.
        Используется на экране ввода кода — чтобы убедиться, что код правильный,
        прежде чем показывать форму ввода нового пароля.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  example: "user@example.com"
                code:
                  type: string
                  example: "3915"
      responses:
        '200':
          description: Результат проверки
          content:
            application/json:
              examples:
                success:
                  summary: Код верный
                  value:
                    success: true
                    message: "Код подтверждён"
                wrong_code:
                  summary: Неверный или истёкший код
                  value:
                    success: false
                    error: "Неверный или просроченный код"

  /api/reset-password:
    post:
      tags: [Auth]
      summary: Шаг 2 сброса пароля — установка нового пароля
      description: |
        Принимает email, код из письма и новый пароль.
        Если код верный — обновляет пароль пользователя и удаляет использованный код.
        После успеха пользователь может войти с новым паролем через `/api/login`.
        
        **Валидация пароля:** минимум 6 символов, хотя бы одна заглавная и одна строчная буква.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, new_password]
              properties:
                email:
                  type: string
                  example: "user@example.com"
                code:
                  type: string
                  example: "3915"
                new_password:
                  type: string
                  example: "NewPass456"
      responses:
        '200':
          description: Результат
          content:
            application/json:
              examples:
                success:
                  summary: Пароль изменён
                  value:
                    success: true
                    message: "Пароль успешно изменён. Теперь вы можете войти."
                wrong_code:
                  summary: Неверный или истёкший код
                  value:
                    success: false
                    error: "Неверный или просроченный код"
                weak_password:
                  summary: Слабый пароль
                  value:
                    success: false
                    error: "Пароль должен содержать минимум 6 символов, включая заглавные и строчные буквы"
                missing_fields:
                  summary: Не все поля заполнены
                  value:
                    success: false
                    error: "Все поля обязательны"
  /profile/api/profile/delete:
    delete:
      tags: [Profile]
      summary: Удаление аккаунта пользователя
      description: |
        Полностью удаляет аккаунт авторизованного пользователя и все связанные данные.

        **Порядок удаления:**
        1. Избранные места (`favorites`)
        2. Посещённые места (`visited_places`)
        3. Места внутри маршрутов (`route_places`)
        4. Маршруты (`routes`)
        5. Жалобы на места (`place_reports`)
        6. Пользовательские категории предложений (`place_suggestion_user_categories`)
        7. Модерированные категории предложений (`place_suggestion_moderated_categories`)
        8. Предложения мест (`place_suggestions`)
        9. Сам пользователь (`users`)

        После удаления сессия завершается (`logout_user()`).

        Требует авторизации — защищён `@login_required`.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Результат операции
          content:
            application/json:
              examples:
                success:
                  summary: Аккаунт удалён
                  value:
                    success: true
                    message: "Аккаунт удалён"
                error:
                  summary: Ошибка при удалении
                  value:
                    success: false
                    error: "Ошибка при удалении аккаунта. Попробуйте позже."
        '401':
          description: Пользователь не авторизован

  # ═══════════════════════════════════════
  #  PLACES
  # ═══════════════════════════════════════

  /api/random-places:
    get:
      tags: [Places]
      summary: Случайные места с фотографиями
      description: |
        Возвращает случайную выборку активных (не закрытых) мест, у которых есть главная фотография.
        Используется на главной странице для «витрины».
      parameters:
        - name: limit
          in: query
          description: Количество мест (по умолчанию 5)
          schema:
            type: integer
            default: 5
            example: 3
      responses:
        '200':
          description: Список случайных мест
          content:
            application/json:
              example:
                success: true
                places:
                  - id: 42
                    title: "Кофейня «Север»"
                    slug: "kofeyna-sever"
                    address: "Невский пр., 44"
                    description: "Уютная кофейня с выпечкой..."
                    photo_url: "https://example.com/photo.jpg"
                    timetable: "Пн-Вс 08:00–22:00"
                    categories: ["cafe", "coffee"]
                    categories_list: ["cafe", "coffee"]

  /api/all-places:
    get:
      tags: [Places]
      summary: Все активные места с пагинацией
      description: |
        Возвращает активные места в случайном порядке.
        Поддерживает исключение уже показанных ID, чтобы реализовать бесконечную прокрутку
        без повторений.
      parameters:
        - name: limit
          in: query
          description: Количество мест на страницу
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          description: Смещение (используется совместно с limit)
          schema:
            type: integer
            default: 0
        - name: exclude_ids
          in: query
          description: "Список ID через запятую — эти места будут пропущены (например: 1,5,23)"
          schema:
            type: string
            example: "1,5,23"
      responses:
        '200':
          description: Список мест
          content:
            application/json:
              example:
                success: true
                places:
                  - id: 7
                    title: "Музей Эрмитаж"
                    slug: "ermitazh"
                    address: "Дворцовая пл., 2"
                    description: "Один из крупнейших музеев мира..."
                    photo_url: "https://example.com/hermitage.jpg"
                    timetable: "Вт-Вс 10:30–18:00"
                    categories: ["museum"]
                    categories_list: ["museum"]
                total: 350
                remaining: 343
                has_more: true

  /api/filter-by-mood:
    get:
      tags: [Places]
      summary: Места по настроению
      description: |
        Фильтрует места через PostgreSQL-функцию `find_places_by_mood(mood_id)`.
        Каждое место содержит дополнительные поля `match_score` и `match_type`,
        показывающие насколько хорошо место соответствует настроению.
        Результаты в случайном порядке для разнообразия.
      parameters:
        - name: mood_id
          in: query
          required: true
          description: ID настроения из таблицы moods
          schema:
            type: integer
            example: 3
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: exclude_ids
          in: query
          description: "ID уже показанных мест через запятую"
          schema:
            type: string
        - name: cache_key
          in: query
          description: Ключ кэша (используется фронтендом, бэкенд игнорирует)
          schema:
            type: string
      responses:
        '200':
          description: Места по настроению
          content:
            application/json:
              example:
                success: true
                mood_id: 3
                mood_name: "Романтика"
                places:
                  - id: 15
                    title: "Ресторан «Белая ночь»"
                    slug: "restoran-belaya-noch"
                    address: "наб. реки Мойки, 12"
                    description: "Романтический ресторан с видом на канал..."
                    photo_url: "https://example.com/rest.jpg"
                    timetable: "Ежедневно 12:00–00:00"
                    categories: ["restaurant"]
                    categories_list: ["restaurant"]
                    match_score: 0.95
                    match_type: "primary"
                total: 28
                remaining: 28
                has_more: true
        '200 (error)':
          description: Настроение не передано
          content:
            application/json:
              example:
                success: false
                error: "Не указано настроение"

  /api/places/search-filter:
    get:
      tags: [Places]
      summary: Поиск и фильтрация мест
      description: |
        Универсальный поисковый эндпоинт для страницы `/places`.
        
        **Поиск** (`q`) ищет по названию, описанию, адресу и категориям с сортировкой по релевантности:
        1. Название начинается с запроса
        2. Запрос содержится в названии
        3. Запрос содержится в описании
        4. Запрос содержится в адресе
        
        **Фильтрация** (`category`) принимает один slug или несколько через запятую.
        
        Без поиска и фильтров — случайный порядок.
        Возвращает также список всех доступных категорий для фильтра.
      parameters:
        - name: q
          in: query
          description: Поисковый запрос
          schema:
            type: string
            example: "кофейня"
        - name: category
          in: query
          description: "Slug категории или несколько через запятую: cafe,bar"
          schema:
            type: string
            example: "cafe"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 12
        - name: exclude_ids
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Результаты поиска
          content:
            application/json:
              example:
                success: true
                places:
                  - id: 42
                    title: "Кофейня «Север»"
                    slug: "kofeyna-sever"
                    address: "Невский пр., 44"
                    description: "Уютная кофейня..."
                    photo_url: "https://example.com/photo.jpg"
                    timetable: "Пн-Вс 08:00–22:00"
                    categories: ["cafe"]
                    categories_list: ["cafe"]
                total: 14
                page: 1
                per_page: 12
                has_more: true
                all_categories:
                  - slug: "cafe"
                    name: "Кофейни"
                  - slug: "bar"
                    name: "Бары"
                  - slug: "museum"
                    name: "Музеи"
                search_query: "кофейня"
                category_filter: ""
                is_search_mode: true

  /api/places/search:
    get:
      tags: [Places]
      summary: Быстрый поиск мест по названию (для формы обращения)
      description: |
        Используется в форме «Сообщить об ошибке» для поиска конкретного места.
        Минимум 2 символа для выполнения запроса.
        Требует авторизации.
      security:
        - sessionCookie: []
      parameters:
        - name: q
          in: query
          required: true
          description: Строка поиска (минимум 2 символа)
          schema:
            type: string
            example: "эрмит"
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Найденные места
          content:
            application/json:
              examples:
                results:
                  summary: Найдены результаты
                  value:
                    success: true
                    places:
                      - id: 7
                        title: "Музей Эрмитаж"
