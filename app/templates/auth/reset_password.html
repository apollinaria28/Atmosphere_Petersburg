<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля | Атмосфера Петербурга</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/login.css') }}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Восстановление доступа</h1>
        </div>

        <div class="auth-body">
            <div class="text-center mb-4">
                <h2>Забыли пароль?</h2>
                <p class="text-muted">Введите ваш email, и мы отправим код для сброса пароля</p>
            </div>

            <form id="resetForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="ваш@email.com" required>
                </div>

                <button type="submit" class="btn-auth" id="submitBtn">
                    <span id="buttonText">Отправить код</span>
                    <span id="loadingSpinner" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="/login">Вернуться ко входу</a>
                <div class="mt-3">
                    <a href="/" class="text-muted">
                        <i class="fas fa-arrow-left"></i> Вернуться на главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для сообщений -->
<div class="modal fade" id="messageModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Уведомление</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalMessage">Сообщение</div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showMessage(title, message, type = 'info') {
        $('#modalTitle').text(title);
        $('#modalMessage').text(message);
        const modalHeader = $('.modal-header');
        modalHeader.removeClass('bg-success bg-danger bg-warning bg-info text-white text-dark');
        switch(type) {
            case 'success': modalHeader.addClass('bg-success text-white'); break;
            case 'error':   modalHeader.addClass('bg-danger text-white'); break;
            case 'warning': modalHeader.addClass('bg-warning text-dark'); break;
            default:        modalHeader.addClass('bg-info text-white');
        }
        new bootstrap.Modal(document.getElementById('messageModal')).show();
    }

    $(document).ready(function() {
        $('#resetForm').on('submit', function(e) {
            e.preventDefault();
            const email = $('#email').val().trim();
            if (!email || !email.includes('@')) {
                showMessage('Ошибка', 'Введите корректный email', 'error');
                return;
            }

            $('#buttonText').hide();
            $('#loadingSpinner').show();
            $('#submitBtn').prop('disabled', true);

            $.ajax({
                url: '/api/forgot-password',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ email }),
                success: function(response) {
                    $('#buttonText').show();
                    $('#loadingSpinner').hide();
                    $('#submitBtn').prop('disabled', false);

                    if (response.success) {
                        showMessage('Успех', response.message, 'success');
                        // Перенаправляем на страницу ввода кода
                        setTimeout(() => {
                            window.location.href = '/reset-password/confirm?email=' + encodeURIComponent(email);
                        }, 1500);
                    } else {
                        showMessage('Ошибка', response.error, 'error');
                    }
                },
                error: function() {
                    showMessage('Ошибка', 'Не удалось отправить запрос. Попробуйте позже.', 'error');
                    $('#buttonText').show();
                    $('#loadingSpinner').hide();
                    $('#submitBtn').prop('disabled', false);
                }
            });
        });
    });
</script>
</body>
</html>
