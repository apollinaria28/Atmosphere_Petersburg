<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена пароля | Атмосфера Петербурга</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/login.css') }}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Смена пароля</h1>
        </div>
        <div class="auth-body">
            <div class="text-center mb-4">
                <h2>Восстановление доступа</h2>
                <p class="text-muted">Код отправлен на <strong id="displayEmail">{{ request.args.email }}</strong></p>
            </div>

            <!-- ШАГ 1: проверка кода -->
            <div id="step1">
                <form id="verifyCodeForm">
                    <input type="hidden" id="email" value="{{ request.args.email }}">
                    <div class="mb-3">
                        <label for="code" class="form-label">Код из письма</label>
                        <input type="text" class="form-control" id="code" maxlength="6" placeholder="0000" required>
                    </div>
                    <button type="submit" class="btn-auth" id="verifyBtn">
                        <span id="verifyBtnText">Подтвердить код</span>
                        <span id="verifySpinner" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                    </button>
                </form>
            </div>

            <!-- ШАГ 2: ввод нового пароля (скрыт) -->
            <div id="step2" style="display: none;">
                <form id="resetPasswordForm">
                    <input type="hidden" id="hiddenEmail" value="{{ request.args.email }}">
                    <input type="hidden" id="hiddenCode" value="">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Новый пароль</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="newPassword" minlength="6" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Подтвердите пароль</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmPassword" minlength="6" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth" id="resetBtn">
                        <span id="resetBtnText">Сменить пароль</span>
                        <span id="resetSpinner" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                    </button>
                </form>
            </div>

            <div class="auth-footer">
                <a href="/login">Вернуться ко входу</a>
                <div class="mt-3">
                    <a href="/" class="text-muted">
                        <i class="fas fa-arrow-left"></i> Вернуться на главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для сообщений -->
<div class="modal fade" id="messageModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Уведомление</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalMessage">Сообщение</div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const icon = field.nextElementSibling.querySelector('i');
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    function showMessage(title, message, type = 'info') {
        $('#modalTitle').text(title);
        $('#modalMessage').text(message);
        const modalHeader = $('.modal-header');
        modalHeader.removeClass('bg-success bg-danger bg-warning bg-info text-white text-dark');
        switch(type) {
            case 'success': modalHeader.addClass('bg-success text-white'); break;
            case 'error':   modalHeader.addClass('bg-danger text-white'); break;
            case 'warning': modalHeader.addClass('bg-warning text-dark'); break;
            default:        modalHeader.addClass('bg-info text-white');
        }
        new bootstrap.Modal(document.getElementById('messageModal')).show();
    }

    $(document).ready(function() {
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (!email) {
            window.location.href = '/reset-password';
            return;
        }
        $('#displayEmail').text(email);
        $('#email').val(email);
        $('#hiddenEmail').val(email);

        // Шаг 1: проверка кода
        $('#verifyCodeForm').on('submit', function(e) {
            e.preventDefault();
            const code = $('#code').val().trim();
            if (!code || code.length !== 6) {
                showMessage('Ошибка', 'Введите 6-значный код', 'error');
                return;
            }

            $('#verifyBtnText').hide();
            $('#verifySpinner').show();
            $('#verifyBtn').prop('disabled', true);

            $.ajax({
                url: '/api/verify-reset-code',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ email: email, code: code }),
                success: function(response) {
                    $('#verifyBtnText').show();
                    $('#verifySpinner').hide();
                    $('#verifyBtn').prop('disabled', false);

                    if (response.success) {
                        // Код верный – показываем шаг 2, сохраняем код
                        $('#hiddenCode').val(code);
                        $('#step1').hide();
                        $('#step2').show();
                    } else {
                        showMessage('Ошибка', response.error, 'error');
                    }
                },
                error: function() {
                    showMessage('Ошибка', 'Не удалось проверить код. Попробуйте позже.', 'error');
                    $('#verifyBtnText').show();
                    $('#verifySpinner').hide();
                    $('#verifyBtn').prop('disabled', false);
                }
            });
        });

        // Шаг 2: смена пароля
        $('#resetPasswordForm').on('submit', function(e) {
            e.preventDefault();
            const newPass = $('#newPassword').val();
            const confirmPass = $('#confirmPassword').val();
            const code = $('#hiddenCode').val();

            if (newPass.length < 6) {
                showMessage('Ошибка', 'Пароль должен содержать минимум 6 символов', 'error');
                return;
            }
            if (newPass !== confirmPass) {
                showMessage('Ошибка', 'Пароли не совпадают', 'error');
                return;
            }

            $('#resetBtnText').hide();
            $('#resetSpinner').show();
            $('#resetBtn').prop('disabled', true);

            $.ajax({
                url: '/api/reset-password',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    email: email,
                    code: code,
                    new_password: newPass
                }),
                success: function(response) {
                    $('#resetBtnText').show();
                    $('#resetSpinner').hide();
                    $('#resetBtn').prop('disabled', false);

                    if (response.success) {
                        showMessage('Успех', response.message, 'success');
                        setTimeout(() => window.location.href = '/login', 2000);
                    } else {
                        showMessage('Ошибка', response.error, 'error');
                    }
                },
                error: function() {
                    showMessage('Ошибка', 'Не удалось сменить пароль. Попробуйте позже.', 'error');
                    $('#resetBtnText').show();
                    $('#resetSpinner').hide();
                    $('#resetBtn').prop('disabled', false);
                }
            });
        });
    });
</script>
</body>
</html>
